# Example 23 — VA IRRRL (Interest Rate Reduction Refinance Loan).
#
# Demonstrates:
#   - VA `RateTermRefi` with `vaServiceContext.priorUse: true`. Per the
#     current B1 funding-fee contract, prior VA-loan use on a rate/term
#     refinance signals an IRRRL, which carries the reduced 0.5% funding-fee
#     tier (vs. the 2.15%/3.3% first-use/subsequent-use tiers on a regular
#     VA refinance).
#   - Refinance shape: no `purchasePrice` / `downPayment`; `appraisedValue`
#     drives LTV. Existing VA mortgage payoff is modeled as a `Mortgage`
#     liability with `payoffAtClose: true` and a forced-payoff variant.
#   - `disabilityExempt: false` keeps the IRRRL fee applicable;
#     `reserveOrGuard: false` selects the regular military fee schedule.
#
# Loan sizing: $385,000 IRRRL against $475,000 appraised value (~81% LTV).
# IRRRL funding fee at 0.5% ≈ $1,925 (paid at close in this file).
#
# Smoke command:
#   pnpm loanscope evaluate --config examples/scenarios/23-va-irrrl.yaml

transaction:
  id: va-irrrl
  productSource:
    kind: generic
  financedUpfrontFees: false
  scenario:
    loanPurpose: RateTermRefi
    occupancy: Primary
    propertyType: SFR
    requestedLoanAmount: 385000
    appraisedValue: 475000
    downPayment: 0
    units: 1
    location:
      stateCode: VA
      county: Prince William
    rateNote:
      noteRatePct: 5.875
      amortizationMonths: 360
      productKind: Fixed
    monthlyHousing:
      propertyTax: 495
      insurance: 155
      hoa: 0
      mi: 0  # VA loans carry no monthly MI
    closingCosts:
      estimatedTotal: 9500
    vaServiceContext:
      priorUse: true          # Prior VA-loan use on RateTermRefi → IRRRL fee tier
      disabilityExempt: false # IRRRL funding fee applies (no exemption)
      reserveOrGuard: false   # Regular military fee schedule

  borrowers:
    - id: b1
      fico: 740
      ficoScores: [738, 740, 744]
      incomes:
        - id: inc_b1_w2
          borrowerId: b1
          type: W2
          monthlyAmount: 10500
          qualifying: true

  assets:
    - id: checking_b1
      type: Checking
      ownerBorrowerIds: [b1]
      amount: 35000
      canUseForClose: true
      canUseForReserves: true
    - id: savings_b1
      type: Savings
      ownerBorrowerIds: [b1]
      amount: 28000
      canUseForClose: true
      canUseForReserves: true

  liabilities:
    - id: mortgage_existing
      type: Mortgage
      borrowerIds: [b1]
      monthlyPayment: 2950
      unpaidBalance: 383500
      payoffAtClose: true
      payoffAmount: 384200
    - id: auto_b1
      type: Auto
      borrowerIds: [b1]
      monthlyPayment: 410
      unpaidBalance: 17800

  variants:
    - id: default
      label: VA IRRRL with existing mortgage payoff
      includedBorrowerIds: [b1]
      forcePayoffLiabilityIds: [mortgage_existing]
